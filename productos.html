<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes"/>
  <title>Productos - Frigorifico Mavie C.A</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="shortcut icon" href="image/logotrasn.png" type="image/x-icon">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- NAVBAR con menú hamburguesa -->
<nav>
  <div class="nav-logo">
    <img class="logo-mav" src="image/logotrasn.png" alt="Logo Frigorifico Mavie">
    <h3 class="title-logo">Frigorifico Mavie</h3>
  </div>

  <button class="menu-icon" id="menuToggle" aria-label="Abrir menú" aria-expanded="false" aria-controls="navLinks">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Inicio</a></li>
    <li><a href="#">Conocenos</a></li>
    <li><a href="productos.html" class="active">Productos</a></li>
    <li><a href="#">Contactanos</a></li>
  </ul>
</nav>
<div class="nav-overlay" id="navOverlay"></div>

<!-- SECCIÓN DE PRODUCTOS -->
<section class="products-section">
  <h2 class="section-title">Nuestros Productos</h2>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Buscar por nombre del producto...">
  </div>
  <div class="products-grid" id="productsGrid">
    <div class="loading">Cargando productos desde el archivo Excel...</div>
  </div>
</section>

<footer>
  © 2025 Frigorifico Mavie — <span>Calidad que se saborea</span> | Seguimos en @frigorificomavie
</footer>

<script>
  // ===== Menú hamburguesa =====
  document.addEventListener('DOMContentLoaded', function () {
    const menuToggle = document.getElementById('menuToggle');
    const navLinks = document.getElementById('navLinks');
    const navOverlay = document.getElementById('navOverlay');

    function openMenu() {
      navLinks.classList.add('open');
      menuToggle.classList.add('open');
      navOverlay.classList.add('show');
      menuToggle.setAttribute('aria-expanded', 'true');
      document.body.classList.add('no-scroll');
    }

    function closeMenu() {
      navLinks.classList.remove('open');
      menuToggle.classList.remove('open');
      navOverlay.classList.remove('show');
      menuToggle.setAttribute('aria-expanded', 'false');
      document.body.classList.remove('no-scroll');
    }

    menuToggle.addEventListener('click', function () {
      const isOpen = navLinks.classList.contains('open');
      isOpen ? closeMenu() : openMenu();
    });

    navLinks.querySelectorAll('a').forEach(function (link) {
      link.addEventListener('click', closeMenu);
    });

    navOverlay.addEventListener('click', closeMenu);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeMenu();
    });

    window.addEventListener('resize', function () {
      if (window.innerWidth > 768) closeMenu();
    });
  });

  // ===== LÓGICA DE PRODUCTOS =====
  const EXCEL_FILE = 'productos.xlsx';
  const IMAGE_FOLDER = 'img_products/';
  const API_TASA_URL = 'https://ve.dolarapi.com/v1/dolares/oficial';

  /**
   * Obtiene la tasa de cambio desde DolarAPI
   * @returns {Promise<number>} tasa actual
   */
  async function obtenerTasa() {
    const grid = document.getElementById('productsGrid');
    try {
      grid.innerHTML = '<div class="loading">🌐 Obteniendo tasa de cambio oficial...</div>';
      const response = await fetch(API_TASA_URL);
      if (!response.ok) throw new Error('Error al conectar con DolarAPI');
      const data = await response.json();
      const tasa = parseFloat(data.promedio);
      if (isNaN(tasa) || tasa <= 0) throw new Error('Tasa de cambio no válida');
      return tasa;
    } catch (error) {
      grid.innerHTML = `<div class="error">⚠️ No se pudo obtener la tasa de cambio oficial.<br>${error.message}<br><br>Por favor, recarga la página o inténtalo más tarde.</div>`;
      throw error; // detener la carga
    }
  }

  /**
   * Detecta las columnas necesarias: nombre y precio $
   */
  function detectColumns(headers) {
    let nombreCol = null;
    let precioUsdCol = null;

    for (let i = 0; i < headers.length; i++) {
      const h = String(headers[i]).toLowerCase().trim();
      if (h.includes('nombre') || h === 'producto') nombreCol = i;
      if (h.includes('precio $') || h.includes('usd') || (h.includes('precio') && h.includes('dolar'))) precioUsdCol = i;
    }
    return { nombreCol, precioUsdCol };
  }

  /**
   * Carga los productos desde el Excel y aplica la tasa recibida
   * @param {number} tasa Cambio USD->Bs
   * @returns {Promise<Array>} productos
   */
  async function cargarProductos(tasa) {
    const grid = document.getElementById('productsGrid');
    try {
      grid.innerHTML = '<div class="loading">📂 Leyendo productos.xlsx...</div>';
      const response = await fetch(EXCEL_FILE);
      if (!response.ok) throw new Error(`No se pudo cargar ${EXCEL_FILE}. Asegúrate de que el archivo exista en la misma carpeta.`);
      
      const arrayBuffer = await response.arrayBuffer();
      const workbook = XLSX.read(arrayBuffer, { type: 'array' });
      const primeraHoja = workbook.Sheets[workbook.SheetNames[0]];
      const datos = XLSX.utils.sheet_to_json(primeraHoja, { header: 1, defval: "" });
      
      if (!datos || datos.length < 2) throw new Error('El archivo Excel está vacío o no tiene datos.');
      
      const headers = datos[0];
      const { nombreCol, precioUsdCol } = detectColumns(headers);
      
      if (nombreCol === null) throw new Error('No se encontró columna "nombre". Asegúrate de tener una columna llamada "nombre" o "producto".');
      
      const productos = [];
      // Ahora los productos empiezan en la fila 1 (índice 1), sin fila de tasa
      for (let i = 1; i < datos.length; i++) {
        const fila = datos[i];
        if (!fila[nombreCol] || String(fila[nombreCol]).trim() === '') continue;
        
        const precioUsdRaw = precioUsdCol !== undefined && fila[precioUsdCol] ? fila[precioUsdCol] : 0;
        const precioUsd = parseFloat(String(precioUsdRaw).replace(',', '.')) || 0;
        
        productos.push({
          nombre: String(fila[nombreCol]).trim(),
          precioUsd: precioUsd,
          precioBs: precioUsd * tasa  // Se usa la tasa obtenida de la API
        });
      }
      
      if (productos.length === 0) throw new Error('No se encontraron productos válidos en el archivo.');
      return productos;
    } catch (error) {
      console.error(error);
      grid.innerHTML = `<div class="error">⚠️ Error: ${error.message}<br><br>Verifica que el archivo "${EXCEL_FILE}" exista y tenga las columnas <strong>nombre</strong> y <strong>precio $</strong>.</div>`;
      return [];
    }
  }

  /**
   * Formatea número como moneda Bs
   */
  function formatoBs(valor) {
    return valor.toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function renderizarProductos(productos, filtro = '') {
    const grid = document.getElementById('productsGrid');
    if (!grid) return;
    
    const filtroLower = filtro.toLowerCase().trim();
    const filtrados = filtroLower === '' ? productos : productos.filter(p => p.nombre.toLowerCase().includes(filtroLower));
    
    if (filtrados.length === 0) {
      grid.innerHTML = `<div class="no-results">❌ No se encontraron productos que coincidan con "${filtro}"</div>`;
      return;
    }
    
    let html = '';
    for (const prod of filtrados) {
      const imageUrl = IMAGE_FOLDER + encodeURIComponent(prod.nombre) + '.png';
      
      const imgTag = `<img src="${escapeHtml(imageUrl)}" 
                           alt="${escapeHtml(prod.nombre)}" 
                           loading="lazy" 
                           style="width:100%; height:160px; object-fit:cover; border-radius:12px; margin-bottom:15px;"
                           onerror="this.onerror=null; this.parentNode.insertBefore(Object.assign(document.createElement('div'),{className:'no-img',innerHTML:'Sin imagen'}), this); this.remove();">`;
      
      html += `
        <div class="product-card">
          ${imgTag}
          <h3>${escapeHtml(prod.nombre)}</h3>
          <div class="price-usd"><span>Precio USD:</span> $${prod.precioUsd.toFixed(2)}</div>
          <div class="price-bs"><span>Precio Bs.:</span> Bs. ${formatoBs(prod.precioBs)}</div>
        </div>
      `;
    }
    grid.innerHTML = html;
  }
  
  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ===== INICIALIZACIÓN =====
  (async function init() {
    const grid = document.getElementById('productsGrid');
    try {
      // 1. Obtener tasa de la API
      const tasa = await obtenerTasa();
      // 2. Cargar productos con esa tasa
      const productos = await cargarProductos(tasa);
      window.productosGlobal = productos;
      if (productos.length > 0) {
        renderizarProductos(productos);
      }
      // 3. Activar búsqueda
      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          renderizarProductos(window.productosGlobal, e.target.value);
        });
      }
    } catch (error) {
      // El error ya se mostró en la función correspondiente
      console.error('Error durante la inicialización:', error);
    }
  })();
</script>

</body>
</html>
